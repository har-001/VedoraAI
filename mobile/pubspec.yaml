name: vedora_mobile
description: "VedoraAI — Mobile Application (Intelligence Behind Every Decision)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # HTTP Client
  dio: ^5.4.0

  # Local Cache
  shared_preferences: ^2.2.2

  # UI & Charts
  fl_chart: ^0.66.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
