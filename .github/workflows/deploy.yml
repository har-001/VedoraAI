name: VedoraAI CI/CD pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Backend Checks ─────────────────────────────
  backend-lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black pytest

    - name: Run code formatter checks (Black)
      run: |
        cd backend
        black --check app --line-length 120 --exclude venv

    - name: Run code linter (Flake8)
      run: |
        cd backend
        # stop the build if there are Python syntax errors or undefined names
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics

  # ── Frontend Checks ────────────────────────────
  frontend-lint-and-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      run: |
        cd web
        npm ci

    - name: Verify build compilation
      run: |
        cd web
        npm run build

  # ── Docker Integrity Checks ────────────────────
  docker-build-check:
    needs: [backend-lint-and-test, frontend-lint-and-build]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Backend Docker Image
      run: |
        docker build -t vedoraai-backend:test ./backend

    - name: Build Frontend Docker Image
      run: |
        docker build -t vedoraai-frontend:test ./web
